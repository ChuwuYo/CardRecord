# Detekt 配置（v1.3.6 起）
#
# 调优原则：项目体量小（单 module、单 Application），规则宁少勿多。
# 全部用 Detekt 默认 severity，但只开启会真正带来价值的几条；其余留作
# 后续 KPI 起来后再加。下面每个规则都写了"为什么开 / 为什么不开"。

build:
  maxIssues: 0      # 0 问题才算通过；CI 必须卡住
  excludeCorrectable: false
  weights:
    complexity: 2
    LongParameterList: 1
    style: 1
    comments: 1

config:
  validation: true   # 配置项拼写错误时立即报错
  warningsAsErrors: false

processors:
  active: true

console-reports:
  active: true
  exclude:
    - 'ProjectStatisticsReport'
    - 'NotificationReport'
    - 'FindingsReport'
    - 'FileBasedFindingsReport'

output-reports:
  active: true

comments:
  active: true
  CommentOverPrivateFunction:
    active: false  # 私有函数上中文 KDoc 挺常见，不强制禁
  CommentOverPrivateProperty:
    active: true
  UndocumentedPublicClass:
    active: false  # Compose Composable 太多，全部要求写 KDoc 不现实
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicProperty:
    active: false

complexity:
  active: true
  ComplexCondition:
    active: true
    threshold: 4
  LargeClass:
    active: true
    threshold: 600   # 单文件 600 行：当前 Composable 都在 200-500，留 buffer
  LongMethod:
    active: true
    threshold: 60    # Composable 普遍偏长，但 60 行还不算 smell
  LongParameterList:
    active: true
    functionThreshold: 6
    constructorThreshold: 6
  TooManyFunctions:
    active: false    # 一文件一个 Composable 群组是 Compose 的惯用结构，不要禁
  CyclomaticComplexMethod:
    active: true
    threshold: 15

empty-blocks:
  active: true
  EmptyCatchBlock:
    active: true
  EmptyFunctionBlock:
    active: false  # Compose 经常需要空 lambda 做 placeholder（如 onClick = {}）
  EmptyKtFile:
    active: true

exceptions:
  active: true
  SwallowedException:
    active: true
  TooGenericExceptionCaught:
    active: true
  TooGenericExceptionThrown:
    active: true
    exceptionNames:
      - 'Error'
      - 'Exception'
      - 'RuntimeException'
      - 'Throwable'

naming:
  active: true
  ClassNaming:
    active: true
  FunctionNaming:
    active: true
  PackageNaming:
    active: true
  TopLevelPropertyNaming:
    active: true
  VariableNaming:
    active: true
  MatchingDeclarationName:
    active: false  # 一文件一个 Composable 是惯例，名字允许跟文件不一样

performance:
  active: true
  ArrayPrimitive:
    active: true
  ForEachOnRange:
    active: true
  SpreadOnSignature:
    active: true
  UnnecessaryTemporaryInstantiation:
    active: true

potential-bugs:
  active: true
  AvoidReferentialEquality:
    active: true
  CastToNullableType:
    active: true
  Deprecation:
    active: true
  ImplicitDefaultLocale:
    active: true
  ImplicitUnitReturnType:
    active: false  # Compose Composable 显式 :Unit 太啰嗦
  MissingPackageDeclaration:
    active: true
  NullCheckOnMutableProperty:
    active: true
  UnconditionalJumpStatementInLoop:
    active: true

style:
  active: true
  ClassOrdering:
    active: false   # 容易跟 ktlint 重复
  DataClassContainsFunctions:
    active: false
  DataClassShouldBeImmutable:
    active: false
  EqualsNullCall:
    active: true
  ExplicitCollectionElementAccessMethod:
    active: false
  ExplicitItLambdaParameter:
    active: false  # `it` 在小 lambda 里更可读
  ExpressionBodySyntax:
    active: false   # 与 ktlint.expression 体规则会冲突，统一交给 ktlint
  ForbiddenComment:
    active: true
    comments:
      - reason: '业务 TODO 必须立刻解决，不留到下一个 sprint'
        value: 'TODO:'
      - reason: '已知的坏味道，不能上线'
        value: 'FIXME:'
      - reason: '禁止在产品代码里标注 STOPSHIP'
        value: 'STOPSHIP:'
  MagicNumber:
    active: true
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
      - '100'
      - '1000'
    ignoreHashCodeFunction: true
    ignoreAnnotation: true
    ignoreNamedArgument: true
    ignoreEnums: true
  MaxLineLength:
    active: true
    maxLineLength: 140
    excludePackageStatements: true
  RedundantVisibilityModifierRule:
    active: true
  ReturnCount:
    active: true
    max: 3
  ThrowsCount:
    active: true
    max: 2
  UnusedImports:
    active: true
  UnusedPrivateMember:
    active: true
  UseArrayLiteralsInAnnotations:
    active: true
  UseCheckOrError:
    active: true
  UseDataClass:
    active: false  # Compose 偏好 immutable class + copy()，data class 不是唯一答案
  UseRequire:
    active: true
  UselessPostfixExpression:
    active: true
