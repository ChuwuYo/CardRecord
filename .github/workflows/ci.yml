name: CI

# 验证关：对所有分支的 push 和 PR 跑格式、单测和 Android Lint，不出 APK。
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# 同分支新推送自动取消旧运行，省 runner 额度
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          cmdline-tools-version: '14742923'

      - name: Install SDK packages
        run: |
          yes | sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools" > /dev/null

      # 仅提供缓存和构建报告；Gradle 版本由 Wrapper 唯一决定。
      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          dependency-graph: disabled

      # gradle.properties 写死的本地代理在 runner 上不存在，运行时剥掉（不提交回仓库）。
      - name: Disable local Maven proxy
        run: |
          sed -i -E '/^systemProp\.(http|https)\.(proxyHost|proxyPort|nonProxyHosts)=/d' gradle.properties

      - name: ktlint
        run: |
          ./gradlew ktlintCheck --no-daemon || {
            echo "::group::ktlint violation reports"
            find app/build/reports/ktlint -name '*.txt' -exec sh -c 'echo "== $1 =="; cat "$1"' _ {} \;
            echo "::endgroup::"
            exit 1
          }

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Android Lint
        run: ./gradlew :app:lintDebug --no-daemon --stacktrace

      # 测试报告留档，失败时方便排查
      - name: Upload test report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore
