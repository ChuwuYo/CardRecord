name: CI

# 验证关：对所有分支的 push 和 PR 跑 ktlint + JVM 单元测试。
# 与 build-apk.yml 分工：本工作流只做静态检查 + 测试，不出 APK。
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# 同分支新推送自动取消旧运行，省 runner 额度
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools" > /dev/null

      # CI 显式安装与 Wrapper 相同的 Gradle 版本，便于 action 缓存和版本审计。
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4
        with:
          gradle-version: '9.4.1'
          dependency-graph: disabled

      # gradle.properties 写死的本地代理在 runner 上不存在，运行时剥掉（不提交回仓库）。
      - name: Disable sandbox-only Maven proxy
        run: |
          sed -i -E '/^systemProp\.(http|https)\.(proxyHost|proxyPort|nonProxyHosts)=/d' gradle.properties

      - name: ktlint
        run: |
          gradle ktlintCheck --no-daemon || {
            echo "::group::ktlint violation reports"
            find app/build/reports/ktlint -name '*.txt' -exec sh -c 'echo "== $1 =="; cat "$1"' _ {} \;
            echo "::endgroup::"
            exit 1
          }

      - name: Unit tests
        run: gradle :app:testDebugUnitTest --no-daemon --stacktrace

      # 测试报告留档，失败时方便排查
      - name: Upload test report
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore
