name: Build APK

# 手动触发（Actions 页面点 "Run workflow"，可选任意分支）或推送到 main 时构建 release APK。
# 产物：1) 本次运行的 Artifacts（cardrecord-release-apk，zip，需登录）；
#       2) 发到滚动预发布 Release「apk-latest」，提供免登录的 .apk 直链（手机可直接下）。
on:
  workflow_dispatch:
  push:
    branches: [ main ]

# 需要 write 才能由 runner 创建/更新 Release（不受本沙箱 tag push 限制，走 GITHUB_TOKEN）
permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools" > /dev/null

      # CI 显式安装与 Wrapper 相同的 Gradle 版本，便于 action 缓存和版本审计。
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4
        with:
          gradle-version: '8.14.4'
          dependency-graph: disabled

      # gradle.properties 里写死的 127.0.0.1:18080 是本地沙箱的出口代理，
      # runner 上不存在，会让依赖下载卡死/失败。CI 运行时剥掉这几行
      # （只改 runner 的工作副本，不提交回仓库，沙箱构建仍可用代理）。
      - name: Disable sandbox-only Maven proxy
        run: |
          sed -i -E '/^systemProp\.(http|https)\.(proxyHost|proxyPort|nonProxyHosts)=/d' gradle.properties

      - name: Restore release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.CARDRECORD_RELEASE_KEYSTORE_BASE64 }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RELEASE_KEYSTORE_BASE64"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/cardrecord-release.p12"
          chmod 600 "$RUNNER_TEMP/cardrecord-release.p12"

      - name: Build release APK
        env:
          CARDRECORD_RELEASE_STORE_FILE: ${{ runner.temp }}/cardrecord-release.p12
          CARDRECORD_RELEASE_STORE_PASSWORD: ${{ secrets.CARDRECORD_RELEASE_STORE_PASSWORD }}
          CARDRECORD_RELEASE_KEY_ALIAS: ${{ secrets.CARDRECORD_RELEASE_KEY_ALIAS }}
          CARDRECORD_RELEASE_KEY_PASSWORD: ${{ secrets.CARDRECORD_RELEASE_KEY_PASSWORD }}
        run: gradle :app:assembleRelease --no-daemon --stacktrace

      - name: Verify release signature
        env:
          EXPECTED_CERT_SHA256: ${{ secrets.CARDRECORD_RELEASE_CERT_SHA256 }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$EXPECTED_CERT_SHA256"
          actual="$(keytool -printcert -jarfile app/build/outputs/apk/release/app-release.apk | awk -F': ' '/SHA256:/{print $2; exit}')"
          test "$actual" = "$EXPECTED_CERT_SHA256"
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose --print-certs app/build/outputs/apk/release/app-release.apk

      - name: Delete release keystore
        if: ${{ always() }}
        run: rm -f "$RUNNER_TEMP/cardrecord-release.p12"

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cardrecord-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      # 读出 versionName，仅用于 Release 标题/说明展示
      - name: Read versionName
        id: ver
        run: echo "name=$(grep -oP 'versionName = \"\K[^\"]+' app/build.gradle.kts)" >> "$GITHUB_OUTPUT"

      - name: Move rolling tag to this build
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/apk-latest" >/dev/null 2>&1; then
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/git/refs/tags/apk-latest" \
              -f sha="$GITHUB_SHA" -F force=true >/dev/null
          else
            gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
              -f ref='refs/tags/apk-latest' -f sha="$GITHUB_SHA" >/dev/null
          fi

      # 把 APK 发到滚动预发布「apk-latest」：每次构建把该 tag 移到当前提交并覆盖同名资产，
      # 下载直链固定不变：
      #   https://github.com/<owner>/<repo>/releases/download/apk-latest/app-release.apk
      - name: Publish APK to rolling pre-release (apk-latest)
        # v2 固定到完整 commit，避免第三方 tag 漂移。
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: apk-latest
          name: 最新测试包 v${{ steps.ver.outputs.name }}
          prerelease: true
          body: |
            自动构建的最新可安装 APK（使用 CardRecord 固定发布密钥签名；此 Release 仍是滚动测试渠道）。
            - 版本：v${{ steps.ver.outputs.name }}
            - 提交：${{ github.sha }}
            - 分支：${{ github.ref_name }}

            ⚠️ 如果手机上安装的是 2026-07-15 之前的旧测试包，它使用不同的临时 debug 证书，不能直接覆盖安装。请先在旧 App 中导出 JSON 配置，再卸载旧包、安装本 APK，最后导入 JSON；直接卸载会清除本地数据。

            直接下载下方 Assets 里的 `app-release.apk` 即可安装。
          files: app/build/outputs/apk/release/app-release.apk
