org.gradle.jvmargs=-Xmx3072m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official
# 通过环境代理访问外部 Maven
systemProp.https.proxyHost=127.0.0.1
systemProp.https.proxyPort=18080
systemProp.http.proxyHost=127.0.0.1
systemProp.http.proxyPort=18080
systemProp.http.nonProxyHosts=localhost|127.0.0.1|*.svc|*.cluster.local
systemProp.https.nonProxyHosts=localhost|127.0.0.1|*.svc|*.cluster.local
# Robolectric 的 android-all-instrumented SDK 镜像（默认 Sonatype 在国内网络不稳）
# 本地能直连 Maven Central 时可删掉
systemProp.robolectric.dependency.repo.url=https://maven.aliyun.com/repository/central
